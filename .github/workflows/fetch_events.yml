name: Fetch Events Gap

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:  # Allow manual trigger

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reconstruct Gmail token
        run: |
          echo "${{ secrets.GMAIL_TOKEN }}" > token.json

      - name: Reconstruct Google Calendar service account credentials
        run: |
          echo "${{ secrets.GOOGLE_CALENDAR_CREDENTIALS }}" > service_account.json

      - name: Run event fetcher
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python src/main.py
